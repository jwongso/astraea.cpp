<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <title>astraea.cpp — eval delta viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title">
      <h1>astraea.cpp eval delta</h1>
      <div class="subtitle">Golden expectations vs. retrieval substrate vs. model answer — pure text diff, no LLM judge</div>
    </div>
    <div class="header-actions">
      <a href="probe.html" class="header-link" title="Pick one fixture, hit probe, watch retrieval + answer stream live">🔬 live probe</a>
    </div>
    <div class="meta" id="meta"></div>
  </div>
</header>

<main>

  <section id="summary" class="summary"></section>

  <section class="filters">
    <label><input type="checkbox" id="f-ok" checked> ok</label>
    <label><input type="checkbox" id="f-answer_gap" checked> answer_gap</label>
    <label><input type="checkbox" id="f-context_gap" checked> context_gap</label>
    <label><input type="checkbox" id="f-bad" checked> bad</label>
    <label><input type="checkbox" id="f-errors" checked> errors</label>
    <input type="search" id="search" placeholder="filter by id, topic, or question…">
    <span class="grow"></span>
    <button id="expand-all">expand all</button>
    <button id="collapse-all">collapse all</button>
    <button id="copy-llm" title="Copy the deterministic markdown delta report — paste straight into an LLM">📋 copy LLM report</button>
    <button id="download-md" title="Download report.md">⬇ report.md</button>
    <button id="copy-link" title="Copy a permalink to the currently-focused fixture">🔗 permalink</button>
    <button id="probe-all" title="Re-run every visible fixture against the live service (sequential)" disabled>▶ probe ALL (live)</button>
  </section>

  <section id="probe-banner" class="probe-banner hidden"></section>

  <section id="fixtures"></section>

</main>

<footer>
  <span>Report regenerated by <code>tools/eval_must_include/run_eval.py</code></span>
  <span class="grow"></span>
  <span id="thresholds"></span>
</footer>

<script src="app.js"></script>

</body>
</html>
