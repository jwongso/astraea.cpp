name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Clang/Debug + ASan + UBSan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang \
            ninja-build \
            cmake \
            libspdlog-dev \
            catch2

      # pybind11 3.x is not in Ubuntu apt repos; bindings are disabled in CI.
      # The differential parity tests (tests/diff/) also require a local private
      # Python repo and are excluded here - run them locally with pytest tests/diff/.
      - name: Configure
        run: cmake --preset dev -DASTRAEA_BUILD_BINDINGS=OFF

      - name: Build
        run: cmake --build --preset dev -j$(nproc)

      - name: Test
        run: ctest --preset dev --output-on-failure
