name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Job-level env vars: tell CMake to wrap clang invocations with ccache.
# CPM_SOURCE_CACHE is set per-job via a setup step (below) so the path
# expands using $HOME on whichever runner OS we are on, not a hardcoded
# /home/runner — keeps the workflow portable when the macOS-arm64 matrix
# job lands.
env:
  CMAKE_C_COMPILER_LAUNCHER:   ccache
  CMAKE_CXX_COMPILER_LAUNCHER: ccache

jobs:
  test:
    name: Clang/Debug + ASan + UBSan
    runs-on: ubuntu-24.04

    # Redis service for the RedisCoordinator integration tests. test_redis_coordinator
    # opens a real connection to localhost:6379 - if the service is missing the test
    # is skipped (REDIS_HOST env not set), not failing. ASan / UBSan instrumentation
    # is unaffected by the service container.
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Performance-regression guard: tools/run_nz_tenancy.sh sets per-process
      # env vars including ENABLE_THINKING. PR #57 root-caused a 17.8x TTFT
      # regression to ENABLE_THINKING="true" in this script silently bypassing
      # the config.hpp default of false. This check fails the build if anyone
      # re-introduces the same value, with a pointer to the bench evidence.
      - name: Run-script perf-regression guard
        run: |
          # Match both double-quoted ("true") and single-quoted ('true') forms,
          # plus unquoted (=true). All three are valid Bash but only one would
          # have been caught by a naive grep.
          if grep -qE "ENABLE_THINKING=['\"]?true['\"]?" tools/run_nz_tenancy.sh; then
            echo "::error file=tools/run_nz_tenancy.sh::ENABLE_THINKING=true detected; this adds ~12s TTFT on Qwen3. See PR #57 / BENCHMARK_PERF.md before re-enabling."
            exit 1
          fi
          # Allow-list pattern (future): when intentionally opting in, set
          # ENABLE_THINKING="true"  # bench-allowed: reason-here
          # then update the grep above to skip lines containing "bench-allowed".

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang \
            ninja-build \
            cmake \
            libspdlog-dev \
            libre2-dev \
            libhiredis-dev \
            libmimalloc-dev \
            catch2 \
            libjsoncpp-dev \
            libssl-dev \
            uuid-dev \
            zlib1g-dev \
            libbrotli-dev \
            git

      # Drogon is ~50K LOC; without ccache every CI run rebuilds it from
      # scratch (~2 min). With ccache + the CPM source cache below, warm runs
      # drop to ~30-40 s — Drogon objects are pure cache hits and only our
      # changed TUs recompile.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ github.job }}-${{ runner.os }}
          max-size: 500M
          verbose: 2

      - name: Setup CPM cache path
        run: echo "CPM_SOURCE_CACHE=$HOME/.cache/CPM" >> "$GITHUB_ENV"

      # CPM clones each dependency once; with this cache the Drogon shallow
      # clone (~50 MB) and glaze checkout survive across runs. Invalidated
      # automatically when CMakeLists.txt changes (e.g. on Drogon tag bump).
      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key:  cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      # pybind11 3.x is not in Ubuntu apt repos. The differential parity
      # harness has its own job below (`parity`) which pip-installs pybind11
      # against a Python venv. The Catch2 job builds without bindings to keep
      # this job hermetic and ASan-friendly.
      - name: Configure
        run: cmake --preset dev -DASTRAEA_BUILD_BINDINGS=OFF

      - name: Build
        run: cmake --build --preset dev -j$(nproc)

      - name: Test
        env:
          # Tests that need Redis check REDIS_HOST/REDIS_PORT and skip themselves
          # when unset. The CI service container above exposes redis at
          # localhost:6379, so set the env vars here.
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: ctest --preset dev --output-on-failure

      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose

  parity:
    name: pybind11 differential parity (C++ vs Python reference)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout C++ repo
        uses: actions/checkout@v4

      - name: Clone Python reference repo (jwongso/astraea)
        run: |
          git clone --depth 1 https://github.com/jwongso/astraea.git "$RUNNER_TEMP/astraea-py"

      - name: Install C++ build deps (core only — no Drogon, no Catch2)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang \
            ninja-build \
            cmake \
            libspdlog-dev \
            libre2-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pybind11 + pytest
        run: pip install --upgrade "pybind11>=3.0" pytest

      # Parity job has its own ccache slot (different key prefix) so it does
      # not collide with the test job's Drogon objects. Cache is small here —
      # just astraea_core + the pybind11 wrapper TU.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ github.job }}-${{ runner.os }}
          max-size: 100M
          verbose: 2

      # Bindings-only build:
      #   ASTRAEA_BUILD_CLIENTS=OFF — skip Drogon (~5 min) and glaze fetch; the
      #     bindings module only links astraea_core.
      #   ASTRAEA_BUILD_TESTS=OFF   — skip Catch2 entirely; this job doesn't
      #     install libcatch2-dev and the parity tests are pytest-based.
      #   ASTRAEA_NATIVE_OPTS=OFF   — runner is Intel; skip -march=znver5 and
      #     -flto=thin so the artefact runs on the same host that builds it.
      #   ASTRAEA_BUILD_BINDINGS=ON — opt in to building _astraea_cpp.
      # We do NOT use --preset prod because the prod preset assumes znver5;
      # explicit -D flags are clearer and keep the prod preset semantic.
      - name: Configure (bindings only, no Drogon, no Catch2, no -march)
        run: |
          PYBIND11_CMAKE_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())")
          cmake -B build-prod -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DASTRAEA_BUILD_BINDINGS=ON \
            -DASTRAEA_BUILD_CLIENTS=OFF \
            -DASTRAEA_BUILD_TESTS=OFF \
            -DASTRAEA_NATIVE_OPTS=OFF \
            -Dpybind11_DIR="$PYBIND11_CMAKE_DIR"

      - name: Build _astraea_cpp bindings
        run: cmake --build build-prod -t _astraea_cpp -j$(nproc)

      - name: Run differential parity tests
        env:
          ASTRAEA_PY_PATH: ${{ runner.temp }}/astraea-py
        run: pytest tests/diff/ -v

      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose
